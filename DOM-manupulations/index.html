<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body{
      background:
    radial-gradient(at 20% 30%, #00c9ff 0px, transparent 50%),
    radial-gradient(at 80% 20%, #ff6ec4 0px, transparent 50%),
    radial-gradient(at 40% 80%, #7873f5 0px, transparent 50%),
    radial-gradient(at 90% 70%, #00f2fe 0px, transparent 50%),
    #067f6f;

  height: 100vh;
        }
        legend{
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-size: 32px;

        }
         
        fieldset{
            width: 300px;
            height: 80px;
            padding: 200px;
            font-size: 20px;
            background-color: #01040890;
            border-radius: 12px;
            border-bottom-left-radius: 66px;
            border-top-right-radius: 66px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: 300ms;
        }
        fieldset:hover{
            transform:translate(0px, 20px);
            transition: 500ms;
        }
        div{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 102%;
        }
        input{
            border: none;
            padding: 20px;
            outline: transparent;
            font-size: 23px;
            border-radius: 12px;
        }
  p{
    box-sizing: border-box;
    color: rgb(147, 147, 37);
    margin-left: 170px;
    margin-top: -15px;
    display: block;
    font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    font-size: 22px;
    transition: 300ms;
}p:hover{
    transform: translate(7px,12px);
    transition: 700ms;
    border: 2px solid gray;
    border-radius: 12px;
    padding: 12px;
}

    </style>
    <body>
   <div>
 <fieldset>

                    <p></p>
        </fieldset>

   </div>
